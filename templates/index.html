<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MySellComb Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="layout">
        <aside class="log-panel">
            <div class="panel-header">
                <h2>Request Logs</h2>
                <span class="panel-subtitle">HTTP traffic, crawl state, and auto-save results</span>
            </div>
            <div id="logConsole" class="log-console"></div>
        </aside>

        <main class="dashboard-panel">
            <div class="top-bar">
                <div>
                    <h1>MySellComb Dashboard</h1>
                    <p class="subtitle">Run TikTok search crawling, inspect results, and monitor Google Sheet saves.</p>
                </div>
            </div>

            <section class="control-card">
                <div class="control-row two-columns">
                    <div class="input-group">
                        <label for="intervalSelect">Repeat interval</label>
                        <select id="intervalSelect">
                            <option value="60">1 minute</option>
                            <option value="300">5 minutes</option>
                            <option value="600">10 minutes</option>
                            <option value="1800">30 minutes</option>
                            <option value="3600" selected>1 hour</option>
                            <option value="21600">6 hours</option>
                            <option value="43200">12 hours</option>
                            <option value="86400">24 hours</option>
                        </select>
                    </div>

                    <div id="tiktokControls" class="tiktok-config hidden">
                        <div class="input-group input-group-wide">
                            <label for="tiktokQueryInput">TikTok keyword / video URL</label>
                            <div class="input-combo">
                                <select id="tiktokInputMode" onchange="updateTiktokInputModeUI()">
                                    <option value="keyword" selected>Keyword</option>
                                    <option value="url">Video URL</option>
                                </select>
                                <input id="tiktokQueryInput" type="text" placeholder="e.g. camping gear">
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="tiktokLimit">Google Sheet save count</label>
                            <input id="tiktokLimit" type="number" min="1" max="30" value="10">
                        </div>
                        <div class="input-group">
                            <label for="tiktokSaveMode">Same-day save mode</label>
                            <select id="tiktokSaveMode">
                                <option value="overwrite" selected>Overwrite same keyword today</option>
                                <option value="append">Append today</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="source-button-row">
                    <button id="sourceBtnCoupang" class="source-btn active" onclick="selectSource('coupang')">Coupang</button>
                    <button id="sourceBtnNaver" class="source-btn" onclick="selectSource('naver')">Naver</button>
                    <button id="sourceBtnTiktok" class="source-btn" onclick="selectSource('tiktok')">TikTok</button>
                </div>

                <div class="control-box">
                    <button class="action-btn primary" onclick="startCrawl()">Start repeat crawl</button>
                    <button class="action-btn danger" onclick="stopCrawl()">Stop repeat crawl</button>
                    <button class="action-btn secondary" onclick="runSelectedFetch()">Run fetch now</button>
                    <button class="action-btn neutral" onclick="checkHealth()">Health check</button>
                    <button id="togglePollingLogsBtn" class="action-btn quiet" onclick="togglePollingLogs()">Show polling logs</button>
                </div>

                <div id="crawlStatus" class="status-box stopped">Waiting for a request.</div>
                <div id="resultInfo" class="result-info">Select a source to begin.</div>
            </section>

            <section class="table-panel">
                <table>
                    <thead>
                        <tr>
                            <th>Source</th>
                            <th>Name</th>
                            <th>Views / Price</th>
                            <th>Link</th>
                            <th>Comments / Reviews</th>
                            <th>Likes / Rating</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr>
                            <td colspan="6" class="empty-row">No crawl result yet.</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        let selectedSource = "coupang";
        let showPollingLogs = false;

        function selectSource(source) {
            selectedSource = source;

            const ids = [
                ["sourceBtnCoupang", "coupang"],
                ["sourceBtnNaver", "naver"],
                ["sourceBtnTiktok", "tiktok"]
            ];

            for (const [id, value] of ids) {
                const button = document.getElementById(id);
                button.classList.toggle("active", value === source);
            }

            document.getElementById("tiktokControls").classList.toggle("hidden", source !== "tiktok");
            document.getElementById("resultInfo").textContent =
                source === "tiktok"
                    ? "TikTok auto mode selected. Choose keyword or video URL, set the final Google Sheet save count, and choose overwrite or append for today's same-keyword rows. Logged-out session will be enforced."
                    : `Selected source: ${source}`;
        }

        function escapeHtml(value) {
            if (value === null || value === undefined) return "";
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function refreshPollingLogButton() {
            const button = document.getElementById("togglePollingLogsBtn");
            button.textContent = showPollingLogs ? "Hide polling logs" : "Show polling logs";
        }

        async function togglePollingLogs() {
            showPollingLogs = !showPollingLogs;
            refreshPollingLogButton();
            await loadLogs();
        }

        function updateTiktokInputModeUI() {
            const mode = document.getElementById("tiktokInputMode").value;
            const input = document.getElementById("tiktokQueryInput");

            if (mode === "url") {
                input.placeholder = "https://www.tiktok.com/@user/video/1234567890";
                return;
            }

            input.placeholder = "e.g. camping gear";
        }

        function formatTiktokSessionSuffix(data) {
            if (!data || !data.login_state) return "";
            let suffix = ` / session=${data.login_state}`;
            if (data.login_state_before && data.login_state_before !== data.login_state) {
                suffix += ` (before=${data.login_state_before})`;
            }
            if (data.login_state_reason) {
                suffix += ` / session_reason=${data.login_state_reason}`;
            }
            return suffix;
        }

        function parseMetricNumber(value) {
            if (value === null || value === undefined) return 0;
            const text = String(value).replaceAll(",", "").trim().toUpperCase();
            if (!text) return 0;

            const multiplier =
                text.endsWith("K") ? 1000 :
                text.endsWith("M") ? 1000000 :
                text.endsWith("B") ? 1000000000 :
                1;
            const raw = multiplier === 1 ? text : text.slice(0, -1);
            const numberValue = Number(raw);
            return Number.isFinite(numberValue) ? numberValue * multiplier : 0;
        }

        function renderProducts(source, products) {
            const tbody = document.getElementById("productTableBody");
            tbody.innerHTML = "";

            if (!products || products.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-row">No products or videos returned.</td>
                    </tr>
                `;
                return;
            }

            const renderItems = source === "tiktok"
                ? [...products].sort((a, b) => {
                    const aViews = Number(a.view_count_num ?? parseMetricNumber(a.view_count));
                    const bViews = Number(b.view_count_num ?? parseMetricNumber(b.view_count));
                    return bViews - aViews;
                })
                : products;

            for (const product of renderItems) {
                const row = document.createElement("tr");
                const linkHtml = product.link
                    ? `<a href="${escapeHtml(product.link)}" target="_blank" rel="noreferrer">Open</a>`
                    : "";

                row.innerHTML = `
                    <td>${escapeHtml(source)}</td>
                    <td>${escapeHtml(product.name)}</td>
                    <td>${escapeHtml(product.view_count || product.price || "")}</td>
                    <td>${linkHtml}</td>
                    <td>${escapeHtml(product.comment_count || product.review || "")}</td>
                    <td>${escapeHtml(product.like_count || product.rating || "")}</td>
                `;
                tbody.appendChild(row);
            }
        }

        async function runFetch(source) {
            const resultInfo = document.getElementById("resultInfo");
            resultInfo.textContent = `${source} fetch in progress...`;

            try {
                const response = await fetch(`/fetch?source=${encodeURIComponent(source)}`);
                const data = await response.json();

                if (!response.ok || !data.success) {
                    resultInfo.textContent = `Error: ${data.error || "fetch failed"}`;
                    return;
                }

                resultInfo.textContent = `${data.source} fetch completed / ${data.count} items`;
                renderProducts(data.source, data.products);
                await loadLogs();
                await loadCrawlStatus();
            } catch (error) {
                resultInfo.textContent = `Error: ${error.message}`;
            }
        }

        async function runTiktokAutoFetch() {
            const inputMode = document.getElementById("tiktokInputMode").value;
            const inputValue = document.getElementById("tiktokQueryInput").value.trim();
            const limit = Number(document.getElementById("tiktokLimit").value || 10);
            const saveMode = document.getElementById("tiktokSaveMode").value;
            const resultInfo = document.getElementById("resultInfo");

            if (!inputValue) {
                resultInfo.textContent = inputMode === "url"
                    ? "TikTok video URL is required."
                    : "TikTok keyword is required.";
                return;
            }

            resultInfo.textContent = `TikTok auto fetch in progress / mode=${inputMode} / input=${inputValue} / save_target=${limit} / save_mode=${saveMode} / session=checking`;

            try {
                const response = await fetch("/fetch/tiktok/auto", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input_mode: inputMode, input_value: inputValue, limit, save_mode: saveMode })
                });

                const data = await response.json();
                const sessionSuffix = formatTiktokSessionSuffix(data);

                if (!response.ok || !data.success) {
                    const blockedSuffix = data.save_error ? ` / save_error=${data.save_error}` : "";
                    resultInfo.textContent = `Error: ${data.error || "TikTok auto fetch failed"}${blockedSuffix}${sessionSuffix}`;
                    renderProducts("tiktok", data.products || []);
                    await loadLogs();
                    await loadCrawlStatus();
                    return;
                }

                const saveSuffix = data.save_error ? ` / save_error=${data.save_error}` : "";
                resultInfo.textContent =
                    `TikTok auto fetch completed / mode=${data.input_mode} / input=${data.input_value} / discovered=${data.discovered_count} / save_target=${data.save_target_count} / save_mode=${data.save_mode} / saved=${data.saved_count}${saveSuffix}${sessionSuffix}`;
                renderProducts("tiktok", data.products);
                await loadLogs();
                await loadCrawlStatus();
            } catch (error) {
                resultInfo.textContent = `Error: ${error.message}`;
            }
        }

        async function runSelectedFetch() {
            if (selectedSource === "tiktok") {
                return runTiktokAutoFetch();
            }
            return runFetch(selectedSource);
        }

        async function startCrawl(force = false) {
            const intervalSeconds = Number(document.getElementById("intervalSelect").value);
            const resultInfo = document.getElementById("resultInfo");

            if (selectedSource === "tiktok") {
                resultInfo.textContent = "TikTok repeat crawl is not enabled. Use 'Run fetch now' with keyword input.";
                return;
            }

            resultInfo.textContent = `${selectedSource} repeat crawl start requested...`;

            try {
                const response = await fetch("/crawl/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        source: selectedSource,
                        interval_seconds: intervalSeconds,
                        force
                    })
                });

                const data = await response.json();

                if (response.status === 409 && data.require_confirm) {
                    const ok = confirm(
                        `${data.message}\nLast run: ${data.last_completed_at || "-"}\nLast count: ${data.last_result_count ?? 0}\nContinue?`
                    );
                    if (ok) {
                        return startCrawl(true);
                    }
                    resultInfo.textContent = "Repeat crawl start canceled.";
                    return;
                }

                if (!response.ok || !data.success) {
                    resultInfo.textContent = `Error: ${data.error || "repeat crawl failed to start"}`;
                    return;
                }

                resultInfo.textContent = data.message;
                await loadLogs();
                await loadCrawlStatus();
            } catch (error) {
                resultInfo.textContent = `Error: ${error.message}`;
            }
        }

        async function stopCrawl() {
            const resultInfo = document.getElementById("resultInfo");
            resultInfo.textContent = "Repeat crawl stop requested...";

            try {
                const response = await fetch("/crawl/stop", { method: "POST" });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    resultInfo.textContent = `Error: ${data.error || "stop failed"}`;
                    return;
                }

                resultInfo.textContent = data.message;
                await loadLogs();
                await loadCrawlStatus();
            } catch (error) {
                resultInfo.textContent = `Error: ${error.message}`;
            }
        }

        async function checkHealth() {
            const resultInfo = document.getElementById("resultInfo");

            try {
                const response = await fetch("/health");
                const data = await response.json();
                resultInfo.textContent = `Health: ${data.status} / sources = ${data.available_sources.join(", ")}`;
                await loadLogs();
                await loadCrawlStatus();
            } catch (error) {
                resultInfo.textContent = `Health check failed: ${error.message}`;
            }
        }

        function getLogClass(line) {
            if (line.includes("[ERROR]")) return "log-line error";
            if (line.includes("[NOTICE]")) return "log-line notice";
            return "log-line";
        }

        async function loadLogs() {
            try {
                const response = await fetch(`/logs?show_polling=${showPollingLogs ? 1 : 0}`);
                const data = await response.json();
                if (!data.success) return;

                const logConsole = document.getElementById("logConsole");
                logConsole.innerHTML = "";

                const logs = data.logs || [];
                if (logs.length === 0) {
                    logConsole.textContent = "No logs yet.";
                    return;
                }

                for (const line of logs) {
                    const div = document.createElement("div");
                    div.className = getLogClass(line);
                    div.textContent = line;
                    logConsole.appendChild(div);
                }

                logConsole.scrollTop = logConsole.scrollHeight;
            } catch (error) {
                console.error("Failed to load logs:", error);
            }
        }

        async function loadCrawlStatus() {
            try {
                const response = await fetch("/crawl/status");
                const data = await response.json();
                if (!data.success) return;

                const statusBox = document.getElementById("crawlStatus");

                if (data.is_running) {
                    statusBox.textContent =
                        `Running / source=${data.source} / interval=${data.interval_seconds}s / started=${data.last_started_at || "-"}`;
                    statusBox.className = "status-box running";
                    return;
                }

                const tiktokDetails = (data.last_details || {}).tiktok || {};
                const tiktokError = (data.last_error || {}).tiktok || "";
                const tiktokSession = tiktokDetails.login_state
                    ? ` / session=${tiktokDetails.login_state}`
                    : "";
                const tiktokSessionReason = tiktokDetails.login_state_reason
                    ? ` / session_reason=${tiktokDetails.login_state_reason}`
                    : "";
                const tiktokInputLabel = tiktokDetails.input_mode === "url" ? "url" : "keyword";
                const tiktokInputSummary = tiktokDetails.input_value
                    ? ` ${tiktokInputLabel}=${tiktokDetails.input_value}`
                    : "";
                const tiktokSaveMode = tiktokDetails.save_mode
                    ? ` / save_mode=${tiktokDetails.save_mode}`
                    : "";
                const tiktokSummary = tiktokDetails.input_value
                    ? ` / tiktok${tiktokInputSummary} discovered=${tiktokDetails.discovered_count ?? 0} save_target=${tiktokDetails.save_target_count ?? 0}${tiktokSaveMode} saved=${tiktokDetails.saved_count ?? 0}${tiktokSession}${tiktokSessionReason}`
                    : "";
                const errorSummary = tiktokError ? ` / last_error=${tiktokError}` : "";

                statusBox.textContent =
                    `Idle / last_stopped=${data.last_stopped_at || "-"} / last_result=${JSON.stringify(data.last_result_count || {})}${tiktokSummary}${errorSummary}`;
                statusBox.className = "status-box stopped";
            } catch (error) {
                console.error("Failed to load crawl status:", error);
            }
        }

        selectSource("coupang");
        updateTiktokInputModeUI();
        refreshPollingLogButton();
        loadLogs();
        loadCrawlStatus();
        setInterval(loadLogs, 2000);
        setInterval(loadCrawlStatus, 2000);
    </script>
</body>
</html>
